<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern CV Builder</title>
    <style>
        /* 1. Global Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #1c1e21;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* 2. Container Styling */
        .form-wrapper {
            width: 100%;
            max-width: 650px;
        }

        .form-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .sub-text {
            color: #65676b;
            margin-bottom: 30px;
        }

        /* 3. Form Layout */
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: #4b4f56;
        }

        /* 4. Input Styling */
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dddfe2;
            border-radius: 8px;
            font-size: 16px;
            background-color: #f5f6f7;
            transition: all 0.2s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #1877f2;
            background-color: #fff;
            box-shadow: 0 0 0 2px rgba(24, 119, 242, 0.2);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        /* 5. Image Preview */
        .preview-box {
            margin-top: 10px;
        }

        #img-preview {
            display: none;
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #1877f2;
        }

        /* 6. Button */
        .submit-btn {
            width: 100%;
            background-color: #1877f2;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #166fe5;
        }

        /* Mobile Responsive */
        @media (max-width: 500px) {
            .grid-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="form-wrapper">
        <div class="form-container">
            <h2>Create Your Profile</h2>
            <p class="sub-text">Fill in the details below to generate your modern CV.</p>
            
            <form action="generate.php" method="POST" enctype="multipart/form-data">
                
                <div class="form-group">
                    <label>Profile Picture</label>
                    <input type="file" name="profile_pic" id="profile_pic" accept="image/*" required>
                    <div class="preview-box">
                        <img id="img-preview" src="" alt="Preview">
                    </div>
                </div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="fullname" placeholder="e.g., Cort Wensely balao" required>
                </div>

                <div class="grid-row">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="cort.wensely@evsu.edu.ph" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" placeholder="09123456789" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <input type="text" name="address" placeholder="Ormoc City, Leyte" required>
                </div>

                <div class="form-group">
                    <label>Professional Summary</label>
                    <textarea name="summary" placeholder="Briefly describe yourself..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Education</label>
                    <textarea name="education" placeholder="e.g., Eastern Visayas State University (EVSU-OC)" required></textarea>
                </div>

                <div class="form-group">
                    <label>Skills & Expertise</label>
                    <textarea name="skills" placeholder="List your top skills..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Generate</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
